<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <title>FIRE COMMAND - Tablet Dispatcher Pro</title>
  <link rel="icon" type="image/png" href="/src/icon.png" />
  <link rel="apple-touch-icon" href="/src/icon.png" />
  <meta name="theme-color" content="#000000" />
  <script type="text/javascript"
    src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=f26e585f8772dcc5b2cea00080bdc8c3&libraries=services&autoload=false"></script>
  <style>
    body {
      background: #000000;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    #initial-loading {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justifyContent: center;
      gap: 32px;
    }

    .initial-logo {
      width: 240px;
      height: 240px;
      background-image: url('/src/icon.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      filter: drop-shadow(0 0 30px rgba(255, 100, 0, 0.3));
    }

    .initial-text {
      font-family: sans-serif;
      font-size: 24px;
      font-weight: 900;
      color: #ff6030;
      letter-spacing: 4px;
      text-shadow: 0 0 10px rgba(255, 96, 48, 0.3);
    }
  </style>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    body {
      background: #060d18;
    }

    /* 앱 배경색과 동일 */
  </style>
</head>

<body>
  <div id="root">
    <div id="initial-loading">
      <div style="flex: 1"></div>
      <div class="initial-logo"></div>
      <div class="initial-text">FIRE COMMAND</div>
      <div style="flex: 1"></div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
